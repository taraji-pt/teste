<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Teste</title>

<link href="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>

<style>
body{
    margin:20px;
    background:#ffffff;
    font-family:Tahoma, Arial, sans-serif;
}
h1{
    font-size:18px;
    font-family:Tahoma, Arial, sans-serif;
    margin-bottom:15px;
}
#map{
    width:100%;
    height:700px;
    border:1px solid #ccc;
}
</style>
</head>
<body>

<h1>Mapa Teste</h1>
<div id="map"></div>

<script>

const INITIAL_ZOOM = 4.15;

const map = new maplibregl.Map({
    container: 'map',
    style: {
        version: 8,
        sources: {},
        layers: [
            {
                id: 'background',
                type: 'background',
                paint: {
                    'background-color': '#d8d8d8'
                }
            }
        ]
    },
    center: [9.5, 34.2],
    zoom: INITIAL_ZOOM,
    minZoom: INITIAL_ZOOM
});

map.dragPan.disable();

map.on('zoom', () => {
    if (map.getZoom() <= INITIAL_ZOOM)
        map.dragPan.disable();
    else
        map.dragPan.enable();
});

map.on('load', async () => {

    const response = await fetch('TUN.geojson');
    const tunisia = await response.json();

    map.addSource('tunisia', {
        type: 'geojson',
        data: tunisia
    });

    map.addLayer({
        id: 'tunisia-fill',
        type: 'fill',
        source: 'tunisia',
        paint: {
            'fill-color': '#7fb069',
            'fill-opacity': 1
        }
    });

    map.addLayer({
        id: 'tunisia-border',
        type: 'line',
        source: 'tunisia',
        paint: {
            'line-color': '#404040',
            'line-width': 2
        }
    });

    const pontos = [
        { nome:'Tunis', lon:10.1815, lat:36.8065 },
        { nome:'Sfax', lon:10.7603, lat:34.7406 },
        { nome:'Tozeur', lon:8.1335, lat:33.9197 }
    ];

    pontos.forEach(p => {
        new maplibregl.Marker()
            .setLngLat([p.lon, p.lat])
            .setPopup(
                new maplibregl.Popup().setHTML('<b>' + p.nome + '</b>')
            )
            .addTo(map);
    });

});

</script>

</body>
</html>
