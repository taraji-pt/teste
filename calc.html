<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Market Parser — Clean</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:system-ui,Arial,sans-serif;
  background:#020617;
  color:#e5e7eb;
  padding:20px;
}
.container{max-width:1000px;margin:auto}
.card{
  background:#020617;
  border-radius:14px;
  padding:22px;
  box-shadow:0 15px 30px rgba(0,0,0,.5);
}
h1{text-align:center;margin-bottom:10px}
textarea{
  width:100%;
  min-height:260px;
  background:#0f172a;
  color:#e5e7eb;
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:13px;
}
button{
  margin-top:14px;
  width:100%;
  padding:12px;
  font-size:16px;
  font-weight:700;
  background:#22c55e;
  color:#020617;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
}
th,td{
  padding:8px;
  border-bottom:1px solid #1e293b;
}
th{color:#94a3b8;font-size:12px}
.goals{color:#22c55e;font-weight:700}
.corners{color:#38bdf8;font-weight:700}
.skip{color:#ef4444;font-weight:700}
.manual{
  margin-top:26px;
  padding-top:18px;
  border-top:1px solid #1e293b;
}
input{
  padding:8px;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:#e5e7eb;
  width:100%;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
</style>
</head>
<body>

<div class="container">
<div class="card">
<h1>Market Parser — Clean</h1>

<textarea id="input"></textarea>

<button onclick="processar()">Processar Batch</button>

<div id="output"></div>

<!-- INPUT MANUAL -->
<div class="manual">
<h3>Entrada Manual (fallback)</h3>
<div class="grid">
  <input id="mh" type="number" step="0.25" placeholder="Handicap">
  <input id="mg" type="number" step="0.25" placeholder="O/U Golos">
</div>
<button onclick="manual()">Avaliar Manual</button>
<div id="manualOut"></div>
</div>

</div>
</div>

<script>
function decide(h,g){
  if(h>=1.0 && g>=2.75) return ["⚽ Over Golos","goals"];
  if(h>=0.75 && g<=2.5) return ["🚩 Over Cantos","corners"];
  return ["❌ Skip","skip"];
}

function processar(){
  const lines = document.getElementById("input").value
    .split("\n")
    .map(l=>l.trim());

  let rows=[];
  for(let i=0;i<lines.length;i++){
    // linha das equipas (tem 0 - 0 e handicap no fim)
    if(!/0\s*-\s*0/.test(lines[i])) continue;

    // handicap = último número da linha
    const hMatch = lines[i].match(/([+-]?\d+(\.\d+)?)\s*$/);
    if(!hMatch) continue;
    const handicap = Math.abs(parseFloat(hMatch[1]));

    // nome do jogo
    const parts = lines[i].split(/0\s*-\s*0/);
    if(parts.length!==2) continue;
    const teamA = parts[0].replace(/.*\d{2}:\d{2}/,"").trim();
    const teamB = parts[1].replace(hMatch[1],"").trim();
    const game = teamA+" vs "+teamB;

    // linha seguinte com golos (duas linhas abaixo)
    let goals=null;
    for(let j=i+1;j<i+6 && j<lines.length;j++){
      if(/^\d+(\.\d+)?$/.test(lines[j])){
        goals=parseFloat(lines[j]);
        break;
      }
    }
    if(goals===null) continue;

    const [txt,cls]=decide(handicap,goals);
    rows.push({game,handicap,goals,txt,cls});
  }

  let html="<table><tr><th>#</th><th>Jogo</th><th>Handicap</th><th>O/U</th><th>Decisão</th></tr>";
  rows.forEach((r,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${r.game}</td>
      <td>${r.handicap}</td>
      <td>${r.goals}</td>
      <td class="${r.cls}">${r.txt}</td>
    </tr>`;
  });
  html+="</table>";
  document.getElementById("output").innerHTML=html;
}

function manual(){
  const h=parseFloat(document.getElementById("mh").value);
  const g=parseFloat(document.getElementById("mg").value);
  if(isNaN(h)||isNaN(g)) return;
  const [txt,cls]=decide(h,g);
  document.getElementById("manualOut").innerHTML=
    `<p class="${cls}">${txt}</p>`;
}
</script>

</body>
</html>
