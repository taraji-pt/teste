<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>HT O0.5 — 1X2 Classifier</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:system-ui,Arial,sans-serif;
  background:#020617;
  color:#e5e7eb;
  padding:20px;
}
.container{max-width:1000px;margin:auto}
.card{
  background:#020617;
  border-radius:14px;
  padding:22px;
  box-shadow:0 15px 30px rgba(0,0,0,.5);
}
h1{text-align:center;margin-bottom:10px}
textarea{
  width:100%;
  min-height:260px;
  background:#0f172a;
  color:#e5e7eb;
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:13px;
}
button{
  margin-top:14px;
  width:100%;
  padding:12px;
  font-size:16px;
  font-weight:700;
  background:#22c55e;
  color:#020617;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:18px;
}
th,td{
  padding:8px;
  border-bottom:1px solid #1e293b;
}
th{color:#94a3b8;font-size:12px}
.green{color:#22c55e;font-weight:700}
.yellow{color:#facc15;font-weight:700}
.red{color:#ef4444;font-weight:700}
.note{
  margin-top:14px;
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h1>HT Over 0.5 — 1X2 Classifier</h1>

<textarea id="input" placeholder="Formato:
Jogo, odd1 oddX odd2
Ex:
Leicester vs Watford, 2.15 3.26 2.90
Bolton vs Rotherham, 1.35 4.06 7.33"></textarea>

<button onclick="classificar()">Classificar</button>

<div id="output"></div>

<p class="note">
🟢 = Favorável | 🟡 = Borderline | 🔴 = Evitar  
(Regras baseadas apenas em odds 1X2 de abertura)
</p>

</div>
</div>

<script>
function classificar(){
  const lines=document.getElementById("input").value
    .split("\n")
    .map(l=>l.trim())
    .filter(l=>l);

  let html="<table><tr><th>#</th><th>Jogo</th><th>1</th><th>X</th><th>2</th><th>Sinal</th></tr>";

  lines.forEach((line,i)=>{
    const parts=line.split(",");
    if(parts.length<2) return;

    const game=parts[0].trim();
    const odds=parts[1].trim().split(/\s+/).map(Number);
    if(odds.length!==3) return;

    const [o1,ox,o2]=odds;
    const fav=Math.min(o1,o2);
    const dog=Math.max(o1,o2);

    let signal="🟡 Yellow";
    let cls="yellow";

    // 🔴 RED rules
    if(
      fav<=1.30 ||
      (ox>=3.80 && fav<=1.65) ||
      (dog>=6.50 && fav<=1.50)
    ){
      signal="🔴 Red";
      cls="red";
    }

    // 🟢 GREEN rules
    else if(
      (ox<=3.30 && fav>=1.75 && dog<=4.50) ||
      (o1<=2.80 && o2<=2.80)
    ){
      signal="🟢 Green";
      cls="green";
    }

    html+=`
    <tr>
      <td>${i+1}</td>
      <td>${game}</td>
      <td>${o1}</td>
      <td>${ox}</td>
      <td>${o2}</td>
      <td class="${cls}">${signal}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("output").innerHTML=html;
}
</script>

</body>
</html>
